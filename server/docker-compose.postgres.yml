version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: chainsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainsight
      POSTGRES_PASSWORD: chainsight
      POSTGRES_DB: chainsight
    ports:
      - "5432:5432"
    volumes:
      - chainsight_pgdata:/var/lib/postgresql/data

volumes:
  chainsight_pgdata:
